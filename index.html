<html lang="pt-BR">

    <title>Cidadania Digital: IA & Deepfakes</title>

    <style>
        /* Paleta de Cores de Alta Tecnologia (Cyberpunk/Sci-Fi) */
        :root {
            --bg-main: #060814;          
            --bg-card: #0c102b;          
            --text-primary: #f0f4f9;     
            --text-secondary: #8a9fc4;   
            --neon-blue: #00f2fe;        
            --neon-purple: #9d4edd;      
            --neon-green: #39ff14;       
            --neon-red: #ff0055;         
            --border-cyber: #1e265c;     
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(180deg, #0c102b 0%, var(--bg-main) 100%);
            border-bottom: 2px solid var(--border-cyber);
            padding: 40px 20px 20px 20px;
            text-align: center;
        }

        .logo-cyber {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .logo-cyber span {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }
