<script>
    // Configurações do Jogo da Memória
    const emojis = ['🤖', '🤖', '🔒', '🔒', '💻', '💻', '🔍', '🔍', '🧠', '🧠', '🛡️', '🛡️', '📱', '📱', '🎭', '🎭'];
    let shuffledEmojis = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let lockBoard = false; // Impede cliques extras durante a validação

    function shuffle(array) {
        // Algoritmo confiável de ordenação aleatória
        return array.sort(() => Math.random() - 0.5);
    }

    function createBoard() {
        const grid = document.getElementById('gameGrid');
        if (!grid) return; // Proteção caso o elemento HTML sumisse da tela

        grid.innerHTML = '';
        shuffledEmojis = shuffle([...emojis]);
        flippedCards = [];
        matchedPairs = 0;
        lockBoard = false;

        shuffledEmojis.forEach((emoji, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.index = index;
            card.innerHTML = emoji;
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });
    }

    function flipCard() {
        if (lockBoard) return; // Bloqueia se o tabuleiro estiver travado
        if (this === flippedCards[0]) return; // Evita clicar duas vezes na mesma carta

        this.classList.add('flipped');
        flippedCards.push(this);

        if (flippedCards.length === 2) {
            lockBoard = true; // Trava o clique para o usuário não bugar clicando em 3 cartas rápidas
            setTimeout(checkMatch, 700);
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        const index1 = card1.dataset.index;
        const index2 = card2.dataset.index;

        if (shuffledEmojis[index1] === shuffledEmojis[index2]) {
            card1.classList.add('matched');
            card2.classList.add('matched');
            matchedPairs++;
            
            if (matchedPairs === emojis.length / 2) {
                // Pequeno atraso no alerta para dar tempo da última carta virar visualmente
                setTimeout(() => {
                    alert('Parabéns! Você encontrou todos os conceitos de Cidadania Digital e IA!');
                }, 300);
            }
            // Libera o tabuleiro imediatamente após o acerto
            flippedCards = [];
            lockBoard = false;
        } else {
            // Se errou, desvira as cartas após o tempo visual
            setTimeout(() => {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                flippedCards = [];
                lockBoard = false; // Libera o tabuleiro após desvirar
            }, 300);
        }
    }

    function resetGame() {
        createBoard();
    }

    // Garante que o código execute estritamente quando todo o HTML estiver renderizado
    document.addEventListener('DOMContentLoaded', () => {
        createBoard();
    });
</script>
